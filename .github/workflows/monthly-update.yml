name: Monthly Grant Update

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  update-grants:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e7e0729e916ef287d7785
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Fetch grant data
        run: |
          python scripts/update_grants.py
      
      - name: Generate website
        run: |
          python scripts/generate_grant_website.py index.html --data data.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json index.html
          git commit -m "Automated update: Fetched latest grants and regenerated website" || echo "No changes to commit"
          git push origin main
          